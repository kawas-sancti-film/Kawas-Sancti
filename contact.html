<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Rio Verde Production</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Lato', sans-serif;
  background-color: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}
<body>

<!-- BOUTON GAUCHE -->
<div class="top-left-buttons">
  <a href="team.html">Team</a>
</div>

<!-- BOUTON DROITE -->
<div class="top-buttons">
  <a href="index.html">Accueil</a>
</div>
.contact-container {
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.contact-title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 2px;
}

.contact-link {
  font-size: 26px;
  font-weight: 600;
  color: #fff;
  text-decoration: none;
  padding: 10px 20px;
  border: 1px solid #fff;
  border-radius: 6px;
  transition: all 0.3s ease;
}

.contact-link:hover {
  background-color: #fff;
  color: #000;
  transform: scale(1.05);
}
/* BOUTONS GAUCHE */
.top-left-buttons {
  position: fixed;
  top: 20px;
  left: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 999;
}

.top-left-buttons a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 4px 10px;
  border-bottom: 2px solid #fff;
  transition: all 0.3s ease;
  font-family: 'Lato', sans-serif;
  font-size: 18px;
}

.top-left-buttons a:hover {
  color: #000;
  background-color: #fff;
  border-bottom: 2px solid #000;
}

/* BOUTONS DROITE */
.top-buttons {
  position: fixed;
  top: 20px;
  right: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 999;
}

.top-buttons a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 4px 10px;
  border-bottom: 2px solid #fff;
  transition: all 0.3s ease;
  font-family: 'Lato', sans-serif;
  font-size: 18px;
}

.top-buttons a:hover {
  color: #000;
  background-color: #fff;
  border-bottom: 2px solid #000;
}
/* Responsive */
@media (max-width: 600px) {
  .contact-title { font-size: 28px; }
  .contact-link { font-size: 22px; padding: 8px 16px; }
}
</style>
</head>

<body>

<div class="contact-container">
  <div class="contact-title">Contact</div>
  <a class="contact-link" href="tel:+33684084013">📞 +33 6 84 08 40 13</a>
  <a class="contact-link" href="mailto:rioverdeproduction@gmail.com">✉️ rioverdeproduction@gmail.com</a>
</div>

</body>
</html>
