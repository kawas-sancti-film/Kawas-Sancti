<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rio Verde Production</title>

<!-- FAVICONS -->
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Lato', sans-serif;
  background-color: #000;
  color: #fff;
  text-align: center;
  line-height: 1.8;
}

/* BOUTONS GAUCHE */
.top-left-buttons {
  position: fixed;
  top: 20px;
  left: 30px;
  display: flex;
  gap: 10px;
  z-index: 999;
}

.top-left-buttons a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 4px 10px;
  border-bottom: 2px solid #fff;
  transition: all 0.3s ease;
  font-size: 18px;
}

.top-left-buttons a:hover {
  color: #000;
  background-color: #fff;
  border-bottom: 2px solid #000;
}

/* BOUTONS DROITE */
.top-buttons {
  position: fixed;
  top: 20px;
  right: 30px;
  display: flex;
  gap: 10px;
  z-index: 999;
}

.top-buttons a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 4px 10px;
  border-bottom: 2px solid #fff;
  transition: all 0.3s ease;
  font-size: 18px;
}

.top-buttons a:hover {
  color: #000;
  background-color: #fff;
  border-bottom: 2px solid #000;
}

/* LOGO */
.logo {
  max-width: 300px;
  width: 80%;
  margin: 120px auto 60px auto; /* espace pour les boutons fixed */
  display: block;
}

/* PROJETS */
.projects {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  margin-bottom: 80px;
}

.project-box {
  background-color: #000;
  padding: 20px 40px;
  width: 280px;
  border: 2px solid #fff;
  border-radius: 8px;
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  transition: 0.3s;
}

.project-box:hover {
  background-color: #111;
  border-color: #ccc;
}

/* LIENS BAS */
.bottom-links {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 50px;
  flex-wrap: wrap;
}

.link-box {
  background-color: #000;
  padding: 20px 40px;
  border: 2px solid #fff;
  border-radius: 8px;
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.link-box:hover {
  background-color: #111;
  border-color: #ccc;
}

@media (max-width: 600px) {
  .logo { width: 70%; }
}
</style>
</head>

<body>

<!-- NAVIGATION HAUT -->
<div class="top-left-buttons">
  <a href="team.html">Team</a>
</div>

<div class="top-buttons">
  <a href="contact.html">Contact</a>
</div>

<!-- LOGO -->
<img src="images/Logo.png" alt="Rio Verde Production Logo" class="logo">

<!-- PROJETS -->
<div class="projects">
  <a href="Kawas.html" class="project-box">Kawas Sancti</a>
  <a href="RioVerde.html" class="project-box">Rio Verde</a>
</div>

<!-- TEAM & CONTACT EN BAS (optionnel si tu veux les garder) -->
<section class="bottom-links">
  <a href="team.html" class="link-box">Team</a>
  <a href="contact.html" class="link-box">Contact</a>
</section>

</body>
</html>
